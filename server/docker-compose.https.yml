services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - sms-receiver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./cloudflare-origin:/etc/caddy/origin:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sms_net

volumes:
  caddy_data:
  caddy_config:
